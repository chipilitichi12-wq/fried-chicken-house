<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fried Chicken House - Registro</title>
    <style>
        body { 
    font-family: 'Segoe UI', sans-serif; 
    /* Aquí ponemos la foto como fondo */
    background-image: url('wmremove-transformed (1).png'); 
    background-size: cover;          /* Hace que la foto se estire para cubrir toda la pantalla */
    background-position: center;     /* Centra la imagen */
    background-repeat: no-repeat;    /* Evita que la foto se repita */
    background-attachment: fixed;    /* Fija el fondo para que no se mueva al hacer scroll */
    
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0; 
}
        
        .card { 
            background: white; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 100%; 
            max-width: 400px; 
            border: 2px solid #D35400; 
            overflow: hidden;
        }

        .header-container {
    /* Quitamos el degradado temporalmente para ver si la foto carga sola */
    background-image: url('image_3b90c2.png');
    
    height: 320px;
    width: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #000; /* Fondo negro por si la foto falla */
    
    border-bottom: 3px solid #D35400;
}

        .logo-redondo { 
    width: 140px;      /* Aumentamos de 100px a 140px */
    height: 140px;     /* Aumentamos de 100px a 140px */
    border-radius: 50%; 
    border: 4px solid white; /* Un borde un poquito más grueso ayuda a tapar bordes */
    margin-bottom: 10px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    background-color: white; /* Esto asegura que si el logo tiene transparencia, no se vea nada detrás */
}

        .form-content { padding: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #D35400; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #loading-ui { display: none; padding: 40px; text-align: center; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 20px 0; }
        #progress { width: 0%; height: 100%; background: #28a745; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-ui">
            <div class="header-container">
                
                
            </div>
            
            <div class="form-content">
                <form id="miFormulario" action="/guardar" method="POST">
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="text" name="nombre" placeholder="Nombre" required>
                    <input type="text" name="apellido" placeholder="Apellido" required>
                    <input type="number" name="edad" placeholder="Edad" required>
                    <input type="text" name="ciudad" placeholder="Ciudad" required>
                    <input type="text" name="direccion" placeholder="Dirección" required>
                    <input type="tel" name="celular" placeholder="Número celular" required>
                    <input type="text" name="dni" placeholder="DNI" required>
                    <button type="button" onclick="proceder()">Enviar Registro</button>
                </form>
            </div>
        </div>

        <div id="loading-ui">
            <img src="logo.png" class="logo-redondo" alt="Logo">
            <h3>Estamos guardando tu registro...</h3>
            <div class="progress-bar"><div id="progress"></div></div>
            <div id="check" style="font-size: 50px; color: #28a745; display: none;">✔</div>
        </div>
    </div>

    <script>
        function proceder() {
            const form = document.getElementById('miFormulario');
            if (!form.checkValidity()) {
                form.reportValidity();
                return; 
            }
            document.getElementById('form-ui').style.display = 'none';
            document.getElementById('loading-ui').style.display = 'block';

            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.getElementById('check').style.display = 'block';
                    setTimeout(() => form.submit(), 500);
                } else {
                    width += 2;
                    document.getElementById('progress').style.width = width + '%';
                }
            }, 30);
        }
    </script>
</body>
</html>
