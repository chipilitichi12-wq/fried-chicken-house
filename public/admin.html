<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <style>
        /* Fondo general de la página */
        .admin-body {
            background-image: url('wmremove-transformed (1).png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El contenedor del panel */
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* La cabecera con la imagen */
        .promo-header {
            width: 100%;
            height: 250px;
            background-image: url('image_3b90c2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* El cuerpo del formulario */
        .login-body {
            padding: 30px;
            background-color: white;
            text-align: center;
        }
        .container {
    background: white;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    /* Borde naranja de 2px alrededor de toda la tarjeta */
    border: 2px solid #D35400;
}

        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #D35400; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        #panel { display: none; }
        .data-item { margin-bottom: 8px; text-align: left; }
        .btn-borrar { background-color: #dc3545; margin-top: 15px; }
    </style>
</head>
<body class="admin-body">

    <div class="container">
        <div class="promo-header"></div>

        <div class="login-body">
            <div id="acceso">
                <h2>Acceso al Panel</h2>
                <input type="password" id="pass" placeholder="Ingresa la contraseña">
                <button onclick="verificar()">Ingresar</button>
            </div>

            <div id="panel">
                <h2>Buscar Cliente</h2>
                <input type="text" id="dniBusqueda" placeholder="Ingresa el DNI a buscar">
                <button onclick="buscarCliente()">Buscar</button>
                <div id="resultado" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <script>
        function verificar() {
            const clave = document.getElementById('pass').value;
            // Usamos un trim() para limpiar espacios accidentales
            if (clave.trim() === "matypz") { 
                document.getElementById('acceso').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else {
                alert("Contraseña incorrecta");
            }
        }

        async function buscarCliente() {
            const dni = document.getElementById('dniBusqueda').value;
            const res = await fetch(`/buscar?dni=${dni}`);
            const data = await res.json();
            
            const resultadoDiv = document.getElementById('resultado');
            
            if (data.error) {
                resultadoDiv.innerHTML = "<strong>Cliente no encontrado.</strong>";
            } else {
                resultadoDiv.innerHTML = `
                    <div style="text-align:left; border-top:2px solid #D35400; padding-top:15px; margin-top:10px;">
                <p><strong>Email:</strong> ${data.email}</p>
                <p><strong>Nombre:</strong> ${data.nombre}</p>
                <p><strong>Apellido:</strong> ${data.apellido}</p>
                <p><strong>Edad:</strong> ${data.edad}</p>
                <p><strong>Ciudad:</strong> ${data.ciudad}</p>
                <p><strong>Dirección:</strong> ${data.direccion}</p>
                <p><strong>Número celular:</strong> ${data.celular}</p>
                <p><strong>DNI:</strong> ${data.dni}</p>
                
                <button class="btn-borrar" onclick="eliminarCliente('${data.dni}')" style="background:#D35400; color:white; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px;">Borrar Cliente</button>
            </div>
                `;
            }
        }

        async function eliminarCliente(dni) {
            if (confirm("¿Estás seguro de que quieres borrar a este cliente?")) {
                const res = await fetch(`/eliminar?dni=${dni}`);
                const result = await res.json();
                if (result.success) {
                    alert("Cliente eliminado");
                    document.getElementById('resultado').innerHTML = ""; 
                    document.getElementById('dniBusqueda').value = "";
                }
            }
        }
    </script>
