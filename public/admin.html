<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f4f4f4; }
        #acceso { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #panel { display: none; width: 100vw; height: 100vh; flex-direction: column; background: white; }
        
        input { padding: 15px; margin: 10px; border: 2px solid #ddd; border-radius: 10px; }
        button { padding: 15px; background-color: #D35400; color: white; border: none; border-radius: 10px; cursor: pointer; }

        /* Estructura de columnas */
        #contenedor-principal { display: flex; flex: 1; overflow: hidden; }
        #columna-lista { width: 300px; border-right: 2px solid #D35400; overflow-y: auto; padding: 10px; padding-right: 25px;}
        #columna-detalle { flex: 1; padding: 20px; overflow-y: auto; background: #fff; }
        .item-nombre { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .item-nombre:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <div id="acceso">
        <h2>Acceso al Panel</h2>
        <input type="password" id="pass" placeholder="Ingresa la contraseña">
        <button onclick="verificar()">Ingresar</button>
    </div>

    <div id="panel">
        <div style="padding: 15px; background: #333; color: white;"><h2>Panel de Administración</h2></div>
        <div id="contenedor-principal">
            <div id="columna-lista">
                <h3>Registros</h3>
                <input type="text" id="buscador" placeholder="Buscar..." onkeyup="filtrarLista()" style="width: 90%;">
                <div id="lista-nombres"></div>
            </div>
            <div id="columna-detalle">
                <h3>Información del Cliente</h3>
                <div id="detalle-cliente"><p>Selecciona un nombre de la lista.</p></div>
            </div>
        </div>
    </div>

    <script>
        // Función para verificar contraseña
        function verificar() {
            const clave = document.getElementById('pass').value;
            if (clave.trim() === "matypz") {
                document.getElementById('acceso').style.display = 'none';
                document.getElementById('panel').style.display = 'flex';
                cargarListaCompleta();
            } else {
                alert("Contraseña incorrecta");
            }
        }

        // Cargar registros desde tu servidor
        async function cargarListaCompleta() {
            const listaDiv = document.getElementById('lista-nombres');
            listaDiv.innerHTML = "Cargando...";
            const res = await fetch('/obtener-todos'); 
            const datos = await res.json();
            listaDiv.innerHTML = "";
            datos.forEach((cliente) => {
                const div = document.createElement('div');
                div.className = "item-nombre";
                div.innerHTML = cliente.nombre || "Sin nombre";
                div.onclick = () => mostrarDetalle(cliente);
                listaDiv.appendChild(div);
            });
        }

        function mostrarDetalle(cliente) {
    document.getElementById('detalle-cliente').innerHTML = `
        <p><strong>Email:</strong> ${cliente.email || 'No disponible'}</p>
        <p><strong>Nombre:</strong> ${cliente.nombre || 'No disponible'}</p>
        <p><strong>Apellido:</strong> ${cliente.apellido || 'No disponible'}</p>
        <p><strong>Edad:</strong> ${cliente.edad || 'No disponible'}</p>
        <p><strong>Ciudad:</strong> ${cliente.ciudad || 'No disponible'}</p>
        <p><strong>Dirección:</strong> ${cliente.direccion || 'No disponible'}</p>
        <p><strong>Número celular:</strong> ${cliente.celular || 'No disponible'}</p>
        <p><strong>DNI:</strong> ${cliente.dni || 'No disponible'}</p>

        <button onclick="borrarCliente('${cliente.id}')" 
                style="background: #dc3545; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 15px;">
            Eliminar Registro
        </button>
    `;
}
        function filtrarLista() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const items = document.querySelectorAll('.item-nombre');
            items.forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(busqueda) ? "" : "none";
            });
        }
        async function borrarCliente(id) {
    if (confirm("¿Estás seguro de que deseas eliminar este registro permanentemente?")) {
        try {
            const res = await fetch(`/eliminar?id=${id}`);
            const result = await res.json();
            
            if (result.success) {
                alert("Registro eliminado correctamente");
                location.reload(); // Recarga la página para refrescar la lista
            } else {
                alert("Error al eliminar el registro");
            }
        } catch (error) {
            console.error("Error:", error);
        }
    }
}
    </script>
</body>
</html>
